<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 480" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="card1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e3a5f"/>
      <stop offset="100%" stop-color="#1a2d47"/>
    </linearGradient>
    <linearGradient id="card2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2d1f5e"/>
      <stop offset="100%" stop-color="#1f1545"/>
    </linearGradient>
    <linearGradient id="result" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#065f46"/>
      <stop offset="100%" stop-color="#064e3b"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="720" height="480" rx="12" fill="url(#bg1)"/>
  <rect x="1" y="1" width="718" height="478" rx="11" fill="none" stroke="#334155" stroke-width="1"/>

  <!-- Title -->
  <text x="360" y="40" text-anchor="middle" fill="#e2e8f0" font-size="18" font-weight="600">Claude Code Context Flow</text>
  <line x1="200" y1="52" x2="520" y2="52" stroke="#3b82f6" stroke-width="2" opacity="0.5"/>

  <!-- Root CLAUDE.md Card -->
  <rect x="60" y="80" width="260" height="180" rx="10" fill="url(#card1)" stroke="#3b82f6" stroke-width="1.5"/>
  <rect x="60" y="80" width="260" height="36" rx="10" fill="#3b82f6" opacity="0.2"/>
  <text x="190" y="104" text-anchor="middle" fill="#60a5fa" font-size="14" font-weight="600">Root CLAUDE.md</text>
  <text x="80" y="136" fill="#94a3b8" font-size="13">&#x2022;  Naming conventions</text>
  <text x="80" y="158" fill="#94a3b8" font-size="13">&#x2022;  Coding standards</text>
  <text x="80" y="180" fill="#94a3b8" font-size="13">&#x2022;  Deployment process</text>
  <text x="80" y="202" fill="#94a3b8" font-size="13">&#x2022;  Security patterns</text>
  <text x="80" y="224" fill="#94a3b8" font-size="13">&#x2022;  PL/SQL templates</text>

  <!-- Project CLAUDE.md Card -->
  <rect x="400" y="80" width="260" height="180" rx="10" fill="url(#card2)" stroke="#8b5cf6" stroke-width="1.5"/>
  <rect x="400" y="80" width="260" height="36" rx="10" fill="#8b5cf6" opacity="0.2"/>
  <text x="530" y="104" text-anchor="middle" fill="#a78bfa" font-size="14" font-weight="600">Project CLAUDE.md</text>
  <text x="420" y="136" fill="#94a3b8" font-size="13">&#x2022;  Architecture overview</text>
  <text x="420" y="158" fill="#94a3b8" font-size="13">&#x2022;  Package inventory</text>
  <text x="420" y="180" fill="#94a3b8" font-size="13">&#x2022;  Table inventory</text>
  <text x="420" y="202" fill="#94a3b8" font-size="13">&#x2022;  Data flow diagrams</text>
  <text x="420" y="224" fill="#94a3b8" font-size="13">&#x2022;  REST API structure</text>

  <!-- Plus symbol -->
  <text x="347" y="175" text-anchor="middle" fill="#64748b" font-size="28" font-weight="700">+</text>

  <!-- Arrows down -->
  <line x1="190" y1="260" x2="190" y2="290" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <line x1="530" y1="260" x2="530" y2="290" stroke="#8b5cf6" stroke-width="2" marker-end="url(#arrowPurple)"/>
  <line x1="190" y1="290" x2="360" y2="310" stroke="#3b82f6" stroke-width="2"/>
  <line x1="530" y1="290" x2="360" y2="310" stroke="#8b5cf6" stroke-width="2"/>

  <!-- Merge arrow -->
  <polygon points="360,305 354,295 366,295" fill="#10b981"/>
  <line x1="360" y1="310" x2="360" y2="330" stroke="#10b981" stroke-width="2"/>

  <!-- Result Card -->
  <rect x="180" y="330" width="360" height="56" rx="10" fill="url(#result)" stroke="#10b981" stroke-width="1.5" filter="url(#glow)"/>
  <text x="360" y="356" text-anchor="middle" fill="#6ee7b7" font-size="15" font-weight="600">Claude Code understands your ENTIRE EBS setup</text>
  <text x="360" y="376" text-anchor="middle" fill="#34d399" font-size="12">No database connection required</text>

  <!-- Bottom file types -->
  <line x1="360" y1="386" x2="360" y2="410" stroke="#10b981" stroke-width="1" stroke-dasharray="4,3"/>

  <rect x="80" y="415" width="155" height="40" rx="8" fill="#1e293b" stroke="#475569" stroke-width="1"/>
  <text x="157" y="436" text-anchor="middle" fill="#cbd5e1" font-size="12" font-weight="500">DDL &#x2192; table structures</text>

  <rect x="258" y="415" width="200" height="40" rx="8" fill="#1e293b" stroke="#475569" stroke-width="1"/>
  <text x="358" y="436" text-anchor="middle" fill="#cbd5e1" font-size="12" font-weight="500">PKS &#x2192; package interfaces</text>

  <rect x="482" y="415" width="168" height="40" rx="8" fill="#1e293b" stroke="#475569" stroke-width="1"/>
  <text x="566" y="436" text-anchor="middle" fill="#cbd5e1" font-size="12" font-weight="500">VW &#x2192; view definitions</text>

  <!-- Connecting lines from result to file types -->
  <line x1="157" y1="410" x2="157" y2="415" stroke="#475569" stroke-width="1"/>
  <line x1="358" y1="410" x2="358" y2="415" stroke="#475569" stroke-width="1"/>
  <line x1="566" y1="410" x2="566" y2="415" stroke="#475569" stroke-width="1"/>
  <line x1="157" y1="410" x2="566" y2="410" stroke="#475569" stroke-width="1"/>
</svg>