<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 400" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="apex" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#5b21b6"/>
    </linearGradient>
    <linearGradient id="apps" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <linearGradient id="xxcus" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#047857"/>
    </linearGradient>
    <linearGradient id="ords" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d97706"/>
      <stop offset="100%" stop-color="#b45309"/>
    </linearGradient>
    <marker id="arrowWhite" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="720" height="400" rx="12" fill="url(#bg2)"/>
  <rect x="1" y="1" width="718" height="398" rx="11" fill="none" stroke="#334155" stroke-width="1"/>

  <!-- Title -->
  <text x="360" y="38" text-anchor="middle" fill="#e2e8f0" font-size="18" font-weight="600">Four-Schema Architecture</text>
  <line x1="220" y1="50" x2="500" y2="50" stroke="#3b82f6" stroke-width="2" opacity="0.5"/>

  <!-- XXAPX Box -->
  <rect x="60" y="90" width="170" height="100" rx="10" fill="url(#apex)" opacity="0.9"/>
  <text x="145" y="130" text-anchor="middle" fill="#fff" font-size="18" font-weight="700">XXAPX</text>
  <text x="145" y="152" text-anchor="middle" fill="#ddd6fe" font-size="13">APEX UI Layer</text>
  <text x="145" y="172" text-anchor="middle" fill="#c4b5fd" font-size="11">Applications &amp; pages</text>

  <!-- APPS Box -->
  <rect x="275" y="90" width="170" height="100" rx="10" fill="url(#apps)" opacity="0.9"/>
  <text x="360" y="130" text-anchor="middle" fill="#fff" font-size="18" font-weight="700">APPS</text>
  <text x="360" y="152" text-anchor="middle" fill="#bfdbfe" font-size="13">Business Logic</text>
  <text x="360" y="172" text-anchor="middle" fill="#93c5fd" font-size="11">PL/SQL &amp; views</text>

  <!-- XXCUS Box -->
  <rect x="490" y="90" width="170" height="100" rx="10" fill="url(#xxcus)" opacity="0.9"/>
  <text x="575" y="130" text-anchor="middle" fill="#fff" font-size="18" font-weight="700">XXCUS</text>
  <text x="575" y="152" text-anchor="middle" fill="#bbf7d0" font-size="13">Custom Data</text>
  <text x="575" y="172" text-anchor="middle" fill="#86efac" font-size="11">Tables &amp; staging</text>

  <!-- XXORDS Box -->
  <rect x="275" y="240" width="170" height="100" rx="10" fill="url(#ords)" opacity="0.9"/>
  <text x="360" y="280" text-anchor="middle" fill="#fff" font-size="18" font-weight="700">XXORDS</text>
  <text x="360" y="302" text-anchor="middle" fill="#fef3c7" font-size="13">REST APIs</text>
  <text x="360" y="322" text-anchor="middle" fill="#fde68a" font-size="11">ORDS modules</text>

  <!-- Arrows: XXAPX -> APPS -->
  <line x1="230" y1="140" x2="275" y2="140" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowWhite)"/>

  <!-- Arrows: APPS -> XXCUS -->
  <line x1="445" y1="140" x2="490" y2="140" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowWhite)"/>

  <!-- Arrow: APPS -> XXORDS -->
  <line x1="360" y1="190" x2="360" y2="240" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowWhite)"/>

  <!-- Arrow: XXAPX -> XXORDS (curved) -->
  <path d="M 100 190 L 100 290 L 275 290" fill="none" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrowWhite)"/>

  <!-- External Systems label -->
  <rect x="90" y="350" width="170" height="32" rx="8" fill="#1e293b" stroke="#475569" stroke-width="1"/>
  <text x="175" y="371" text-anchor="middle" fill="#94a3b8" font-size="12">External Systems</text>
  <line x1="175" y1="340" x2="175" y2="350" stroke="#475569" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="100" y1="340" x2="360" y2="340" stroke="#475569" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="360" y1="340" x2="360" y2="340" stroke="#475569" stroke-width="1"/>

  <!-- Legend -->
  <text x="530" y="260" fill="#64748b" font-size="11">XXAPX never touches</text>
  <text x="530" y="276" fill="#64748b" font-size="11">XXCUS directly.</text>
  <text x="530" y="296" fill="#64748b" font-size="11">All access goes</text>
  <text x="530" y="312" fill="#64748b" font-size="11">through APPS.</text>
</svg>