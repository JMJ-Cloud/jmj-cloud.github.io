<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 300" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <marker id="arr3" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="720" height="300" rx="12" fill="url(#bg3)"/>
  <rect x="1" y="1" width="718" height="298" rx="11" fill="none" stroke="#334155" stroke-width="1"/>

  <!-- Title -->
  <text x="360" y="36" text-anchor="middle" fill="#e2e8f0" font-size="18" font-weight="600">EBR Data Access Chain</text>
  <line x1="220" y1="48" x2="500" y2="48" stroke="#3b82f6" stroke-width="2" opacity="0.5"/>

  <!-- Schema labels -->
  <text x="120" y="78" text-anchor="middle" fill="#a78bfa" font-size="13" font-weight="600">XXAPX</text>
  <text x="310" y="78" text-anchor="middle" fill="#60a5fa" font-size="13" font-weight="600">APPS</text>
  <text x="540" y="78" text-anchor="middle" fill="#34d399" font-size="13" font-weight="600">XXCUS</text>

  <!-- Synonym in XXAPX -->
  <rect x="40" y="95" width="160" height="60" rx="8" fill="#1e293b" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="120" y="120" text-anchor="middle" fill="#c4b5fd" font-size="12" font-weight="600">Synonym</text>
  <text x="120" y="140" text-anchor="middle" fill="#94a3b8" font-size="12">TABLE_X</text>

  <!-- Arrow -->
  <line x1="200" y1="125" x2="228" y2="125" stroke="#94a3b8" stroke-width="2" marker-end="url(#arr3)"/>

  <!-- Synonym in APPS -->
  <rect x="230" y="95" width="160" height="60" rx="8" fill="#1e293b" stroke="#2563eb" stroke-width="1.5"/>
  <text x="310" y="120" text-anchor="middle" fill="#93c5fd" font-size="12" font-weight="600">Synonym</text>
  <text x="310" y="140" text-anchor="middle" fill="#94a3b8" font-size="12">TABLE_X</text>

  <!-- Arrow -->
  <line x1="390" y1="125" x2="418" y2="125" stroke="#94a3b8" stroke-width="2" marker-end="url(#arr3)"/>

  <!-- Edition View in XXCUS -->
  <rect x="420" y="95" width="240" height="60" rx="8" fill="#1e293b" stroke="#10b981" stroke-width="1.5"/>
  <text x="540" y="120" text-anchor="middle" fill="#6ee7b7" font-size="12" font-weight="600">Edition View</text>
  <text x="540" y="140" text-anchor="middle" fill="#94a3b8" font-size="12">TABLE_X#</text>

  <!-- Arrow down from Edition View to Base Table -->
  <line x1="540" y1="155" x2="540" y2="180" stroke="#94a3b8" stroke-width="2" marker-end="url(#arr3)"/>

  <!-- Base Table in XXCUS -->
  <rect x="420" y="182" width="240" height="60" rx="8" fill="#064e3b" stroke="#10b981" stroke-width="2"/>
  <text x="540" y="207" text-anchor="middle" fill="#6ee7b7" font-size="12" font-weight="600">Base Table</text>
  <text x="540" y="227" text-anchor="middle" fill="#94a3b8" font-size="12">TABLE_X</text>

  <!-- Explanation -->
  <text x="360" y="275" text-anchor="middle" fill="#64748b" font-size="12">This chain enables zero-downtime patching via Edition-Based Redefinition</text>
</svg>