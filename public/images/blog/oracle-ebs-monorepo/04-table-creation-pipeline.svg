<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 320" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <marker id="arr4" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#60a5fa"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="720" height="320" rx="12" fill="url(#bg4)"/>
  <rect x="1" y="1" width="718" height="318" rx="11" fill="none" stroke="#334155" stroke-width="1"/>

  <!-- Title -->
  <text x="360" y="36" text-anchor="middle" fill="#e2e8f0" font-size="18" font-weight="600">4-Step Table Creation Pipeline</text>
  <line x1="200" y1="48" x2="520" y2="48" stroke="#3b82f6" stroke-width="2" opacity="0.5"/>

  <!-- Step 1 -->
  <rect x="30" y="75" width="145" height="90" rx="10" fill="#1e293b" stroke="#10b981" stroke-width="2"/>
  <rect x="30" y="75" width="44" height="28" rx="10" fill="#10b981" opacity="0.3"/>
  <text x="52" y="94" text-anchor="middle" fill="#6ee7b7" font-size="12" font-weight="700">1</text>
  <text x="102" y="110" text-anchor="middle" fill="#e2e8f0" font-size="14" font-weight="600">CREATE</text>
  <text x="102" y="128" text-anchor="middle" fill="#e2e8f0" font-size="14" font-weight="600">TABLE</text>
  <text x="102" y="152" text-anchor="middle" fill="#34d399" font-size="11">Run as: XXCUS</text>

  <!-- Arrow 1->2 -->
  <line x1="175" y1="120" x2="202" y2="120" stroke="#60a5fa" stroke-width="2" marker-end="url(#arr4)"/>

  <!-- Step 2 -->
  <rect x="205" y="75" width="145" height="90" rx="10" fill="#1e293b" stroke="#3b82f6" stroke-width="2"/>
  <rect x="205" y="75" width="44" height="28" rx="10" fill="#3b82f6" opacity="0.3"/>
  <text x="227" y="94" text-anchor="middle" fill="#60a5fa" font-size="12" font-weight="700">2</text>
  <text x="277" y="110" text-anchor="middle" fill="#e2e8f0" font-size="14" font-weight="600">EDITION</text>
  <text x="277" y="128" text-anchor="middle" fill="#e2e8f0" font-size="14" font-weight="600">VIEW</text>
  <text x="277" y="152" text-anchor="middle" fill="#60a5fa" font-size="11">Run as: APPS</text>

  <!-- Arrow 2->3 -->
  <line x1="350" y1="120" x2="377" y2="120" stroke="#60a5fa" stroke-width="2" marker-end="url(#arr4)"/>

  <!-- Step 3 -->
  <rect x="380" y="75" width="145" height="90" rx="10" fill="#1e293b" stroke="#f59e0b" stroke-width="2"/>
  <rect x="380" y="75" width="44" height="28" rx="10" fill="#f59e0b" opacity="0.3"/>
  <text x="402" y="94" text-anchor="middle" fill="#fbbf24" font-size="12" font-weight="700">3</text>
  <text x="452" y="110" text-anchor="middle" fill="#e2e8f0" font-size="14" font-weight="600">GRANT</text>
  <text x="452" y="128" text-anchor="middle" fill="#e2e8f0" font-size="14" font-weight="600">TO APPS</text>
  <text x="452" y="152" text-anchor="middle" fill="#fbbf24" font-size="11">Run as: XXCUS</text>

  <!-- Arrow 3->4 -->
  <line x1="525" y1="120" x2="552" y2="120" stroke="#60a5fa" stroke-width="2" marker-end="url(#arr4)"/>

  <!-- Step 4 -->
  <rect x="555" y="75" width="145" height="90" rx="10" fill="#1e293b" stroke="#8b5cf6" stroke-width="2"/>
  <rect x="555" y="75" width="44" height="28" rx="10" fill="#8b5cf6" opacity="0.3"/>
  <text x="577" y="94" text-anchor="middle" fill="#a78bfa" font-size="12" font-weight="700">4</text>
  <text x="627" y="110" text-anchor="middle" fill="#e2e8f0" font-size="14" font-weight="600">GRANT +</text>
  <text x="627" y="128" text-anchor="middle" fill="#e2e8f0" font-size="14" font-weight="600">SYNONYM</text>
  <text x="627" y="152" text-anchor="middle" fill="#a78bfa" font-size="11">Run as: APPS</text>

  <!-- File mappings row -->
  <text x="102" y="200" text-anchor="middle" fill="#64748b" font-size="11" font-weight="500">*_00.sql</text>
  <text x="102" y="216" text-anchor="middle" fill="#475569" font-size="10">XXCUS/TABLES/</text>

  <text x="277" y="200" text-anchor="middle" fill="#64748b" font-size="11" font-weight="500">01_AD_ZD_*.sql</text>
  <text x="277" y="216" text-anchor="middle" fill="#475569" font-size="10">PATCHES/</text>

  <text x="452" y="200" text-anchor="middle" fill="#64748b" font-size="11" font-weight="500">02_GRANTS_*.sql</text>
  <text x="452" y="216" text-anchor="middle" fill="#475569" font-size="10">PATCHES/</text>

  <text x="627" y="200" text-anchor="middle" fill="#64748b" font-size="11" font-weight="500">03_GRANTS_*.sql</text>
  <text x="627" y="216" text-anchor="middle" fill="#475569" font-size="10">PATCHES/</text>

  <!-- Connecting dashes -->
  <line x1="102" y1="165" x2="102" y2="190" stroke="#334155" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="277" y1="165" x2="277" y2="190" stroke="#334155" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="452" y1="165" x2="452" y2="190" stroke="#334155" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="627" y1="165" x2="627" y2="190" stroke="#334155" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- Bottom highlight -->
  <rect x="60" y="248" width="600" height="48" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="360" y="268" text-anchor="middle" fill="#94a3b8" font-size="13">One request to Claude Code &#x2192; four files &#x2192; zero errors</text>
  <text x="360" y="286" text-anchor="middle" fill="#64748b" font-size="11">~2 minutes with AI vs. ~20 minutes manually</text>
</svg>