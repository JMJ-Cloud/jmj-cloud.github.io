<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 420" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg6" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <marker id="arr6" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#60a5fa"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="720" height="420" rx="12" fill="url(#bg6)"/>
  <rect x="1" y="1" width="718" height="418" rx="11" fill="none" stroke="#334155" stroke-width="1"/>

  <!-- Title -->
  <text x="360" y="36" text-anchor="middle" fill="#e2e8f0" font-size="18" font-weight="600">Branch &amp; Deployment Strategy</text>
  <line x1="200" y1="48" x2="520" y2="48" stroke="#3b82f6" stroke-width="2" opacity="0.5"/>

  <!-- Branch section -->
  <!-- main branch line -->
  <line x1="60" y1="90" x2="340" y2="90" stroke="#10b981" stroke-width="3"/>
  <circle cx="60" cy="90" r="6" fill="#10b981"/>
  <text x="65" y="82" fill="#6ee7b7" font-size="13" font-weight="600">main</text>
  <text x="155" y="82" fill="#475569" font-size="10">(production-ready)</text>

  <!-- dev branch 1 -->
  <line x1="100" y1="90" x2="130" y2="120" stroke="#3b82f6" stroke-width="2"/>
  <line x1="130" y1="120" x2="260" y2="120" stroke="#3b82f6" stroke-width="2"/>
  <circle cx="130" cy="120" r="4" fill="#3b82f6"/>
  <text x="140" y="116" fill="#60a5fa" font-size="11">developer1-dev</text>

  <!-- dev branch 2 -->
  <line x1="140" y1="90" x2="170" y2="145" stroke="#8b5cf6" stroke-width="2"/>
  <line x1="170" y1="145" x2="300" y2="145" stroke="#8b5cf6" stroke-width="2"/>
  <circle cx="170" cy="145" r="4" fill="#8b5cf6"/>
  <text x="180" y="141" fill="#a78bfa" font-size="11">developer2-dev</text>

  <!-- feature branch -->
  <line x1="200" y1="90" x2="230" y2="170" stroke="#f59e0b" stroke-width="2"/>
  <line x1="230" y1="170" x2="340" y2="170" stroke="#f59e0b" stroke-width="2"/>
  <circle cx="230" cy="170" r="4" fill="#f59e0b"/>
  <text x="240" y="166" fill="#fbbf24" font-size="11">feature/TICKET-1234</text>

  <!-- Environment section -->
  <text x="60" y="228" fill="#94a3b8" font-size="13" font-weight="600">Environment Progression</text>

  <!-- DEV -->
  <rect x="60" y="245" width="100" height="50" rx="8" fill="#1e293b" stroke="#3b82f6" stroke-width="2"/>
  <text x="110" y="275" text-anchor="middle" fill="#60a5fa" font-size="16" font-weight="700">DEV</text>

  <line x1="160" y1="270" x2="195" y2="270" stroke="#60a5fa" stroke-width="2" marker-end="url(#arr6)"/>

  <!-- TEST -->
  <rect x="198" y="245" width="100" height="50" rx="8" fill="#1e293b" stroke="#f59e0b" stroke-width="2"/>
  <text x="248" y="275" text-anchor="middle" fill="#fbbf24" font-size="16" font-weight="700">TEST</text>

  <line x1="298" y1="270" x2="333" y2="270" stroke="#60a5fa" stroke-width="2" marker-end="url(#arr6)"/>

  <!-- PROD -->
  <rect x="336" y="245" width="100" height="50" rx="8" fill="#064e3b" stroke="#10b981" stroke-width="2"/>
  <text x="386" y="275" text-anchor="middle" fill="#6ee7b7" font-size="16" font-weight="700">PROD</text>

  <!-- Deployment order -->
  <text x="500" y="82" fill="#94a3b8" font-size="13" font-weight="600">Deployment Order</text>

  <text x="500" y="108" fill="#10b981" font-size="12" font-weight="600">1.</text>
  <text x="520" y="108" fill="#94a3b8" font-size="12">Tables</text>
  <text x="630" y="108" fill="#475569" font-size="10">XXCUS/TABLES/</text>

  <text x="500" y="130" fill="#10b981" font-size="12" font-weight="600">2.</text>
  <text x="520" y="130" fill="#94a3b8" font-size="12">Edition Views</text>
  <text x="630" y="130" fill="#475569" font-size="10">PATCHES/01_*</text>

  <text x="500" y="152" fill="#10b981" font-size="12" font-weight="600">3.</text>
  <text x="520" y="152" fill="#94a3b8" font-size="12">Grants</text>
  <text x="630" y="152" fill="#475569" font-size="10">PATCHES/02_*</text>

  <text x="500" y="174" fill="#10b981" font-size="12" font-weight="600">4.</text>
  <text x="520" y="174" fill="#94a3b8" font-size="12">Synonyms</text>
  <text x="630" y="174" fill="#475569" font-size="10">PATCHES/03_*</text>

  <text x="500" y="196" fill="#3b82f6" font-size="12" font-weight="600">5.</text>
  <text x="520" y="196" fill="#94a3b8" font-size="12">Package Specs</text>
  <text x="630" y="196" fill="#475569" font-size="10">*_PKS.sql</text>

  <text x="500" y="218" fill="#3b82f6" font-size="12" font-weight="600">6.</text>
  <text x="520" y="218" fill="#94a3b8" font-size="12">Package Bodies</text>
  <text x="630" y="218" fill="#475569" font-size="10">*_PKB.sql</text>

  <text x="500" y="240" fill="#8b5cf6" font-size="12" font-weight="600">7.</text>
  <text x="520" y="240" fill="#94a3b8" font-size="12">Views</text>
  <text x="630" y="240" fill="#475569" font-size="10">APPS/VIEWS/</text>

  <text x="500" y="262" fill="#8b5cf6" font-size="12" font-weight="600">8.</text>
  <text x="520" y="262" fill="#94a3b8" font-size="12">APEX Apps</text>
  <text x="630" y="262" fill="#475569" font-size="10">XXAPX/APEX/</text>

  <text x="500" y="284" fill="#f59e0b" font-size="12" font-weight="600">9.</text>
  <text x="520" y="284" fill="#94a3b8" font-size="12">ORDS Modules</text>
  <text x="630" y="284" fill="#475569" font-size="10">XXORDS/</text>

  <!-- Divider line -->
  <line x1="480" y1="70" x2="480" y2="300" stroke="#334155" stroke-width="1"/>

  <!-- Bottom note -->
  <rect x="60" y="320" width="600" height="76" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="360" y="345" text-anchor="middle" fill="#94a3b8" font-size="12">Versioned patch directories (PATCHES/TICKET/V1/, V2/) provide full audit trail.</text>
  <text x="360" y="365" text-anchor="middle" fill="#94a3b8" font-size="12">Claude Code generates numbered scripts in correct dependency order automatically.</text>
  <text x="360" y="385" text-anchor="middle" fill="#64748b" font-size="11">The main branch is production. Always. If it's not in main, it's not deployed.</text>
</svg>