<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 340" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg5" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <marker id="arr5" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#60a5fa"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="720" height="340" rx="12" fill="url(#bg5)"/>
  <rect x="1" y="1" width="718" height="338" rx="11" fill="none" stroke="#334155" stroke-width="1"/>

  <!-- Title -->
  <text x="360" y="36" text-anchor="middle" fill="#e2e8f0" font-size="18" font-weight="600">Database-to-Git Extraction Pipeline</text>
  <line x1="190" y1="48" x2="530" y2="48" stroke="#3b82f6" stroke-width="2" opacity="0.5"/>

  <!-- Step 1: Oracle DB -->
  <rect x="40" y="80" width="160" height="100" rx="10" fill="#1e293b" stroke="#f59e0b" stroke-width="2"/>
  <text x="120" y="118" text-anchor="middle" fill="#fbbf24" font-size="15" font-weight="700">Oracle DB</text>
  <text x="120" y="140" text-anchor="middle" fill="#94a3b8" font-size="11">XXCUS, APPS,</text>
  <text x="120" y="156" text-anchor="middle" fill="#94a3b8" font-size="11">XXAPX, XXORDS</text>

  <!-- Arrow 1 -->
  <line x1="200" y1="130" x2="238" y2="130" stroke="#60a5fa" stroke-width="2" marker-end="url(#arr5)"/>
  <text x="219" y="120" text-anchor="middle" fill="#475569" font-size="10">DBMS_</text>
  <text x="219" y="132" text-anchor="middle" fill="#475569" font-size="10">METADATA</text>

  <!-- Step 2: SQLcl Extract -->
  <rect x="240" y="80" width="160" height="100" rx="10" fill="#1e293b" stroke="#3b82f6" stroke-width="2"/>
  <text x="320" y="118" text-anchor="middle" fill="#60a5fa" font-size="15" font-weight="700">SQLcl Extract</text>
  <text x="320" y="140" text-anchor="middle" fill="#94a3b8" font-size="11">DDL extraction</text>
  <text x="320" y="156" text-anchor="middle" fill="#94a3b8" font-size="11">by schema &amp; type</text>

  <!-- Arrow 2 -->
  <line x1="400" y1="130" x2="438" y2="130" stroke="#60a5fa" stroke-width="2" marker-end="url(#arr5)"/>

  <!-- Step 3: Staging -->
  <rect x="440" y="80" width="160" height="100" rx="10" fill="#1e293b" stroke="#8b5cf6" stroke-width="2"/>
  <text x="520" y="112" text-anchor="middle" fill="#a78bfa" font-size="15" font-weight="700">staging/</text>
  <text x="520" y="134" text-anchor="middle" fill="#94a3b8" font-size="11">{SCHEMA}/{TYPE}/</text>
  <text x="520" y="150" text-anchor="middle" fill="#94a3b8" font-size="11">*.sql</text>
  <text x="520" y="170" text-anchor="middle" fill="#64748b" font-size="10">Raw DDL files</text>

  <!-- Arrow down from staging -->
  <line x1="520" y1="180" x2="520" y2="210" stroke="#60a5fa" stroke-width="2" marker-end="url(#arr5)"/>

  <!-- Step 4: Python Sorter -->
  <rect x="440" y="212" width="160" height="80" rx="10" fill="#1e293b" stroke="#10b981" stroke-width="2"/>
  <text x="520" y="242" text-anchor="middle" fill="#6ee7b7" font-size="15" font-weight="700">Python Sorter</text>
  <text x="520" y="264" text-anchor="middle" fill="#94a3b8" font-size="11">Prefix matching</text>
  <text x="520" y="280" text-anchor="middle" fill="#94a3b8" font-size="11">+ DDL cleanup</text>

  <!-- Arrow left from sorter -->
  <line x1="440" y1="252" x2="308" y2="252" stroke="#60a5fa" stroke-width="2" marker-end="url(#arr5)"/>

  <!-- Step 5: Project folders -->
  <rect x="120" y="212" width="186" height="80" rx="10" fill="#064e3b" stroke="#10b981" stroke-width="2"/>
  <text x="213" y="242" text-anchor="middle" fill="#6ee7b7" font-size="15" font-weight="700">projects/[name]/</text>
  <text x="213" y="262" text-anchor="middle" fill="#94a3b8" font-size="11">APPS/ XXCUS/ XXAPX/</text>
  <text x="213" y="278" text-anchor="middle" fill="#94a3b8" font-size="11">Properly formatted SQL</text>

  <!-- Bottom note -->
  <text x="360" y="322" text-anchor="middle" fill="#64748b" font-size="11">Existing files are never overwritten &#x2014; extraction only adds new objects</text>
</svg>